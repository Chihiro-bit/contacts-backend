    secret: dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLW9ubHktbXVzdC1iZS1sb25nLWVub3VnaA==
    access-token-expiration: 900000
    refresh-token-expiration: 2592000000
  contact:
    pending-delete-window-seconds: 5
