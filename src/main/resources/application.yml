server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/contacts_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        type:
          preferred_uuid_jdbc_type: CHAR
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      timeout: 3000ms
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: Y29udGFjdHMtYmFja2VuZC1qd3Qtc2VjcmV0LWtleS0yMDI0
    access-token-expiration: 900000   # 15 minutes
    refresh-token-expiration: 2592000000  # 30 days
  websocket:
    allowed-origins: "*"
  contact:
    pending-delete-window-seconds: 5

logging:
  level:
    com.contacts: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
